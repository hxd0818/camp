# CAMP Development Environment
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: camp-postgres
    environment:
      POSTGRES_USER: cdata
      POSTGRES_PASSWORD: cdata_dev_password
      POSTGRES_DB: cdata
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdata -d cdata"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - camp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: camp-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - camp-network

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: camp-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cdata:cdata_dev_password@postgres:5432/cdata
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: camp-dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      UPLOAD_DIR: /app/uploads
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app:ro
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - camp-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: camp-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ../frontend/app:/app/app:ro
      - ../frontend/components:/app/components:ro
      - ../frontend/lib:/app/lib:ro
      - ../frontend/public:/app/public:ro
      frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - camp-network

networks:
  camp-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  uploads:
  frontend_node_modules:
